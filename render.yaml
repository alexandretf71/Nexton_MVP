services:
  - type: web
    name: nexton-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: UI_ORIGIN
        # Set to your nexton-ui Render URL after first deploy, e.g.:
        # https://nexton-ui.onrender.com
        sync: false

  - type: web
    name: nexton-ui
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.ui
    envVars:
      - key: UI_API_BASE_URL
        # Set to your nexton-api Render URL after first deploy, e.g.:
        # https://nexton-api.onrender.com
        sync: false
